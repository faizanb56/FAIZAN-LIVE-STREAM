<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T20 World Cup Live | Tamasha HD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .active-server {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border-color: #3b82f6;
            box-shadow: 0 10px 20px -10px rgba(37, 99, 235, 0.5);
        }

        .video-container {
            box-shadow: 0 0 50px -12px rgba(37, 99, 235, 0.2);
        }

        /* Smooth animation for switching */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 glass-effect border-b border-white/5 py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-play text-white text-sm"></i>
                </div>
                <h1 class="text-xl font-extrabold tracking-tighter uppercase">
                    T20 <span class="text-blue-500">World Cup</span>
                </h1>
            </div>
            <div class="flex items-center gap-2 bg-red-600/10 px-3 py-1 rounded-full border border-red-600/20">
                <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-red-500 uppercase tracking-widest">Live Now</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-28 pb-20 px-4 md:px-8 max-w-7xl mx-auto">
        <div class="grid lg:grid-cols-12 gap-8">
            
            <!-- Player Section -->
            <div class="lg:col-span-8 space-y-6">
                <div class="video-container relative aspect-video bg-black rounded-3xl overflow-hidden border border-white/10">
                    <video id="videoPlayer" class="w-full h-full" controls playsinline poster="https://share.google/1p5RXc0iE5pnLHI1q"></video>
                    <div class="absolute bottom-4 right-4 pointer-events-none">
                        <span id="qualityBadge" class="glass-effect px-3 py-1 rounded-lg text-[10px] font-bold text-white border border-white/20 uppercase">1080P HD+</span>
                    </div>
                </div>

                <div class="glass-effect p-6 rounded-3xl">
                    <h2 id="streamTitle" class="text-2xl font-bold mb-1 tracking-tight">Tamasha Broadcast PK</h2>
                    <p class="text-gray-400 text-sm flex items-center gap-2">
                        <i class="fas fa-signal text-blue-500"></i> High Speed Server • Low Latency Enabled
                    </p>
                </div>
            </div>

            <!-- Server Selection -->
            <div class="lg:col-span-4 space-y-6">
                <div class="px-2">
                    <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-gray-500 mb-4">Select Quality</h3>
                    <div id="serverList" class="space-y-3">
                        <!-- Servers Injected Here -->
                    </div>
                </div>

                <div class="glass-effect rounded-3xl p-6 border border-blue-500/10">
                    <div class="flex items-center gap-4 mb-3">
                        <div class="w-8 h-8 rounded-lg bg-blue-500/20 flex items-center justify-center text-blue-500 text-xs">
                            <i class="fas fa-info-circle"></i>
                        </div>
                        <h4 class="font-bold text-sm">Quality Guide</h4>
                    </div>
                    <p class="text-xs text-gray-400 leading-relaxed">
                        If you are on Mobile Data, use <b>360p</b> or <b>480p</b>. For Wi-Fi users, <b>1080p HD+</b> provides the best premium experience.
                    </p>
                </div>
            </div>

        </div>
    </main>

    <script>
        const streams = [
            { name: "1080P HD+ Quality", quality: "1080P", url: "https://tencentcdn8.tamashaweb.com/v1/019bf00087161567ee93346674d025/019bffb7d77215fc600b1b67f81952/tmsh_srt_output_clone_1080p.m3u8?timeshift=1&mode=6&delay=1800", icon: "fa-bolt" },
            { name: "720P High Definition", quality: "720P", url: "https://tencentcdn8.tamashaweb.com/v1/019bf00087161567ee93346674d025/019bffb7d77215fc600b1b67f81952/tmsh_srt_output_clone_720p.m3u8?timeshift=1&mode=6&delay=1800", icon: "fa-high-definition" },
            { name: "480P Standard Quality", quality: "480P", url: "https://tencentcdn8.tamashaweb.com/v1/019bf00087161567ee93346674d025/019bffb7d77215fc600b1b67f81952/tmsh_srt_output_clone_480p.m3u8?timeshift=1&mode=6&delay=1800", icon: "fa-mobile-alt" },
            { name: "360P Medium Quality", quality: "360P", url: "https://tencentcdn8.tamashaweb.com/v1/019bf00087161567ee93346674d025/019bffb7d77215fc600b1b67f81952/tmsh_srt_output_clone_360p.m3u8?timeshift=1&mode=6&delay=1800", icon: "fa-signal" },
            { name: "240P Data Saver", quality: "240P", url: "https://tencentcdn8.tamashaweb.com/v1/019bf00087161567ee93346674d025/019bffb7d77215fc600b1b67f81952/tmsh_srt_output_clone_240p.m3u8?timeshift=1&mode=6&delay=1800", icon: "fa-leaf" }
        ];

        let currentHls = null;
        let activeIdx = 0;

        function initPlayer(url) {
            const video = document.getElementById('videoPlayer');
            if (currentHls) currentHls.destroy();

            if (Hls.isSupported()) {
                currentHls = new Hls();
                currentHls.loadSource(url);
                currentHls.attachMedia(video);
                currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
        }

        function switchStream(idx) {
            activeIdx = idx;
            const stream = streams[idx];
            document.getElementById('qualityBadge').innerText = stream.quality + " LIVE";
            initPlayer(stream.url);
            renderServers();
        }

        function renderServers() {
            const list = document.getElementById('serverList');
            list.innerHTML = streams.map((s, i) => `
                <button onclick="switchStream(${i})" class="w-full flex items-center gap-4 p-4 rounded-2xl border transition-all duration-300 text-left ${activeIdx === i ? 'active-server border-blue-400' : 'glass-effect border-white/5 hover:border-white/20'}">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center ${activeIdx === i ? 'bg-white/20' : 'bg-blue-500/10'}">
                        <i class="fas ${s.icon} ${activeIdx === i ? 'text-white' : 'text-blue-500'}"></i>
                    </div>
                    <div class="flex-1">
                        <div class="text-sm font-bold">${s.name}</div>
                        <div class="text-[10px] opacity-60 uppercase tracking-widest">Tamasha Server</div>
                    </div>
                    ${activeIdx === i ? '<i class="fas fa-check-circle text-white"></i>' : ''}
                </button>
            `).join('');
        }

        window.onload = () => {
            renderServers();
            initPlayer(streams[0].url);
        };
    </script>
</body>
</html>
